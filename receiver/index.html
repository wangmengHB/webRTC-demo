<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WebRTC Demo - Receiver</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      video { width: 100%; max-width: 720px; background: #000; border-radius: 8px; }
      .row { margin-bottom: 12px; }
      input { padding: 8px; width: 220px; }
      button { padding: 8px 12px; margin-right: 8px; }
      #status { color: #05a; font-weight: 600; }
      #log { white-space: pre-wrap; background: #f6f8fa; padding: 12px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>接收端</h1>
    <p>加入同一房间以接收发送端的视频流。</p>

    <div class="row">
      <label>房间ID: <input id="roomId" value="demo-room" /></label>
      <button id="connectBtn">连接</button>
    </div>

    <div class="row">状态: <span id="status">空闲</span></div>
    <video id="remoteVideo" autoplay playsinline controls></video>
    <h3>日志</h3>
    <div id="log"></div>

    <script src="./main.js"></script>
  </body>
</html>
