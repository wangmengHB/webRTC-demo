<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WebRTC Demo - Sender</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      video { width: 100%; max-width: 720px; background: #000; border-radius: 8px; }
      .row { margin-bottom: 12px; }
      input { padding: 8px; width: 220px; }
      button { padding: 8px 12px; margin-right: 8px; }
      textarea { width: 100%; max-width: 720px; min-height: 130px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      #status { color: #0b5; font-weight: 600; }
      #log { white-space: pre-wrap; background: #f6f8fa; padding: 12px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>视频发送端</h1>
    <p>捕获摄像头并通过手动复制/粘贴完成信令（无需 WebSocket）。</p>

    <div class="row">
      <button id="startBtn">启动摄像头</button>
      <button id="createOfferBtn">生成 Offer</button>
      <button id="applyAnswerBtn">应用 Answer</button>
      <button id="addReceiverCandidatesBtn">添加 Receiver ICE</button>
    </div>

    <h3>1) 发送给接收端：Offer</h3>
    <textarea id="offerOut" readonly placeholder="点击“生成 Offer”后，将这里的内容复制到接收端页面"></textarea>

    <h3>2) 从接收端粘贴：Answer</h3>
    <textarea id="answerIn" placeholder="把接收端生成的 Answer 粘贴到这里"></textarea>

    <h3>3) 发送给接收端：Sender ICE Candidates</h3>
    <textarea id="senderCandidatesOut" readonly placeholder="生成 Offer 后会逐步收集 ICE candidates，复制到接收端"></textarea>

    <h3>4) 从接收端粘贴：Receiver ICE Candidates</h3>
    <textarea id="receiverCandidatesIn" placeholder="把接收端的 ICE candidates JSON 数组粘贴到这里"></textarea>

    <div class="row">状态: <span id="status">空闲</span></div>
    <video id="localVideo" autoplay muted playsinline></video>
    <h3>日志</h3>
    <div id="log"></div>

    <script src="./main.js"></script>
  </body>
</html>
